<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown + Fireworks</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f1117;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }

  /* ── Setup card ── */
  .card {
    background: #1a1d2e;
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    position: relative;
    z-index: 2;
  }

  h1 { font-size: clamp(1.6rem, 5vw, 2.1rem); font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .subtitle { color: #9ca3b8; font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }
  label { display: block; font-size: 0.85rem; color: #9ca3b8; margin-bottom: 8px; }
  .field { margin-bottom: 18px; }

  input[type="datetime-local"],
  input[type="text"] {
    width: 100%;
    background: #12151f;
    border: 1.5px solid #2a2d3e;
    border-radius: 14px;
    color: #fff;
    font-size: 1rem;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type="datetime-local"]:focus,
  input[type="text"]:focus { border-color: #f97316; }
  input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    filter: invert(1); cursor: pointer; opacity: 0.6;
  }

  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, #f97316, #ec4899);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    padding: 15px 20px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.9; }
  .btn-start:active { transform: scale(0.97); }

  .status-msg {
    text-align: center;
    font-size: 0.82rem;
    min-height: 1.2em;
    color: #ef4444;
    margin-bottom: 10px;
  }

  /* ── Running view (counter only, fullscreen) ── */
  #running-view {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  #running-view.visible { display: flex; }

  .timer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    width: min(92vw, 500px);
  }

  .unit {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 24px 8px 18px;
    text-align: center;
    backdrop-filter: blur(8px);
  }
  .unit-num {
    font-size: clamp(2rem, 10vw, 3.5rem);
    font-weight: 900;
    line-height: 1;
    display: block;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .unit-label {
    font-size: 0.68rem;
    color: #9ca3b8;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  /* ── Canvas ── */
  #fw-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    display: none;
  }

  /* ── Celebration message (no overlay bg, floats over fireworks) ── */
  #celebration {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    padding: 24px;
    text-align: center;
  }
  #celebration.visible { display: flex; }

  .cel-msg {
    font-size: clamp(2rem, 7vw, 3.5rem);
    font-weight: 900;
    line-height: 1.25;
    max-width: 680px;
    animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    background: linear-gradient(135deg, #fff 30%, #fde68a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 24px rgba(0,0,0,0.8));
  }

  /* ── X button — top-right corner, always accessible ── */
  #btn-close {
    display: none;
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 30;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.22);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s, transform 0.1s;
    align-items: center;
    justify-content: center;
  }
  #btn-close.visible { display: flex; }
  #btn-close:hover { background: rgba(255,255,255,0.25); }
  #btn-close:active { transform: scale(0.92); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }

  .tip { text-align: center; font-size: 0.78rem; color: #5a5f7a; line-height: 1.5; margin-top: 20px; }
</style>
</head>
<body>

<canvas id="fw-canvas"></canvas>

<!-- X close button — top right, visible during running & celebration -->
<button id="btn-close" onclick="resetAll()" title="Reset">✕</button>

<!-- Celebration message floats over fireworks -->
<div id="celebration">
  <div class="cel-msg" id="cel-text"></div>
</div>

<!-- Setup view -->
<div class="card" id="setup-view">
  <h1>Countdown +<br>Fireworks</h1>
  <p class="subtitle">Pick a time, add your message, and let the app do the dramatic movie ending.</p>

  <div class="field">
    <label>Target date and time</label>
    <input type="datetime-local" id="target-dt">
  </div>

  <div class="field">
    <label>Celebration message</label>
    <input type="text" id="cel-input" placeholder="Happy Birthday, my love! 🎉" maxlength="120">
  </div>

  <div class="status-msg" id="status-msg"></div>

  <button class="btn-start" onclick="startTimer()">Start countdown</button>

  <p class="tip">Tip: standalone file — works offline in Safari/Chrome too.</p>
</div>

<!-- Running view: counter only -->
<div id="running-view">
  <div class="timer-grid">
    <div class="unit"><span class="unit-num" id="d">00</span><div class="unit-label">Days</div></div>
    <div class="unit"><span class="unit-num" id="h">00</span><div class="unit-label">Hours</div></div>
    <div class="unit"><span class="unit-num" id="m">00</span><div class="unit-label">Minutes</div></div>
    <div class="unit"><span class="unit-num" id="s">00</span><div class="unit-label">Seconds</div></div>
  </div>
</div>

<script>
let intervalId = null;
let fwAnimId   = null;
let particles  = [];

// ── Helpers ──────────────────────────────────────────────────────────────────
function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function show(id)  { document.getElementById(id).classList.add('visible'); }
function hide(id)  { document.getElementById(id).classList.remove('visible'); }
function setVis(el, v) { document.getElementById(el).style.display = v ? '' : 'none'; }

// ── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  const dtVal  = document.getElementById('target-dt').value;
  const msgVal = document.getElementById('cel-input').value.trim();
  const status = document.getElementById('status-msg');

  if (!dtVal) { status.textContent = 'Please pick a target date and time.'; return; }
  const target = new Date(dtVal).getTime();
  if (isNaN(target))      { status.textContent = 'Invalid date.'; return; }
  if (target <= Date.now()) { status.textContent = 'Target time must be in the future.'; return; }
  status.textContent = '';

  // Switch views
  setVis('setup-view', false);
  show('running-view');
  show('btn-close');

  if (intervalId) clearInterval(intervalId);
  tick(target, msgVal);
  intervalId = setInterval(() => tick(target, msgVal), 1000);
}

function tick(target, msg) {
  const diff = target - Date.now();
  if (diff <= 0) {
    clearInterval(intervalId); intervalId = null;
    setDisplay(0, 0, 0, 0);
    triggerCelebration(msg);
    return;
  }
  const totalSec = Math.floor(diff / 1000);
  setDisplay(
    Math.floor(totalSec / 86400),
    Math.floor((totalSec % 86400) / 3600),
    Math.floor((totalSec % 3600) / 60),
    totalSec % 60
  );
}

function setDisplay(d, h, m, s) {
  document.getElementById('d').textContent = pad(d);
  document.getElementById('h').textContent = pad(h);
  document.getElementById('m').textContent = pad(m);
  document.getElementById('s').textContent = pad(s);
}

// ── Celebration ───────────────────────────────────────────────────────────────
function triggerCelebration(msg) {
  hide('running-view');
  document.getElementById('cel-text').textContent = msg || "🎉 Time's up!";
  show('celebration');
  startFireworks();
}

function resetAll() {
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  hide('celebration');
  hide('running-view');
  hide('btn-close');
  stopFireworks();
  setDisplay(0, 0, 0, 0);
  setVis('setup-view', true);
}

// ── Fireworks ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('fw-canvas');
const ctx    = canvas.getContext('2d');

const COLORS = [
  '#ff4757','#ffa502','#2ed573','#1e90ff','#eccc68',
  '#ff6b81','#a29bfe','#fd79a8','#00cec9','#fdcb6e',
  '#e17055','#74b9ff','#55efc4','#fab1a0','#81ecec',
];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

class Particle {
  constructor(x, y, color, type) {
    this.x = x; this.y = y; this.color = color; this.type = type;
    this.trail = [];
    if (type === 'shell') {
      this.vx = (Math.random() - 0.5) * 2;
      this.vy = -(Math.random() * 12 + 10);
      this.alpha  = 1;
      this.radius = 3;
    } else {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 7 + 1;
      this.vx     = Math.cos(angle) * speed;
      this.vy     = Math.sin(angle) * speed;
      this.alpha  = 1;
      this.radius = Math.random() * 2.5 + 1;
      this.decay  = Math.random() * 0.012 + 0.008;
      this.gravity= 0.12;
      this.twinkle= Math.random() < 0.3;
    }
  }

  update() {
    if (this.type === 'shell') {
      this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
      if (this.trail.length > 8) this.trail.shift();
      this.x  += this.vx;
      this.y  += this.vy;
      this.vy += 0.25;
      this.alpha -= 0.018;
      return this.alpha > 0 && this.y > 0;
    } else {
      this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
      if (this.trail.length > 5) this.trail.shift();
      this.x  += this.vx;
      this.y  += this.vy;
      this.vy += this.gravity;
      this.vx *= 0.98;
      this.alpha -= this.twinkle ? this.decay * (0.5 + Math.random()) : this.decay;
      return this.alpha > 0;
    }
  }

  draw() {
    ctx.save();
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const r = i / this.trail.length;
      ctx.globalAlpha = t.alpha * r * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.radius * r, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle   = this.color;
    ctx.shadowBlur  = 8;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function explode(x, y) {
  const c1 = COLORS[Math.floor(Math.random() * COLORS.length)];
  const c2 = COLORS[Math.floor(Math.random() * COLORS.length)];
  const n  = Math.floor(Math.random() * 60 + 80);
  for (let i = 0; i < n; i++)
    particles.push(new Particle(x, y, i % 3 === 0 ? c2 : c1, 'spark'));
  // White glitter
  for (let i = 0, g = Math.floor(Math.random() * 20 + 15); i < g; i++) {
    const p = new Particle(x, y, '#fff', 'spark');
    p.radius = Math.random() * 1.5 + 0.5;
    p.decay  = 0.015;
    particles.push(p);
  }
}

function launchShell() {
  const x     = Math.random() * canvas.width;
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const shell = new Particle(x, canvas.height, color, 'shell');
  particles.push(shell);
  const tPeak = Math.abs(shell.vy) / 0.25;
  const peakY = Math.max(Math.random() * canvas.height * 0.55 + canvas.height * 0.05, canvas.height * 0.08);
  setTimeout(() => {
    explode(shell.x + shell.vx * tPeak, peakY);
    const idx = particles.indexOf(shell);
    if (idx !== -1) particles.splice(idx, 1);
  }, tPeak * (1000 / 60));
}

let lastLaunch = 0, launchInterval = 400;

function fwLoop(ts) {
  fwAnimId = requestAnimationFrame(fwLoop);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'lighter';

  if (ts - lastLaunch > launchInterval) {
    launchShell();
    if (Math.random() < 0.4)  setTimeout(launchShell, 120);
    if (Math.random() < 0.15) setTimeout(launchShell, 260);
    lastLaunch = ts;
    launchInterval = Math.random() * 300 + 250;
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update()) { particles.splice(i, 1); continue; }
    particles[i].draw();
  }
}

function startFireworks() {
  resizeCanvas();
  canvas.style.display = 'block';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = []; lastLaunch = 0;
  fwAnimId = requestAnimationFrame(fwLoop);
}

function stopFireworks() {
  if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  canvas.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = [];
}

window.addEventListener('resize', () => {
  if (canvas.style.display !== 'none') resizeCanvas();
});

// Default: 1 minute from now
(function () {
  const dt  = new Date(Date.now() + 60000);
  const p   = n => String(n).padStart(2, '0');
  document.getElementById('target-dt').value =
    `${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}T${p(dt.getHours())}:${p(dt.getMinutes())}`;
})();
</script>
</body>
</html>
